<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智语助手 - AI聊天原型</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft Yahei", sans-serif;
      }
      body {
        display: flex;
        height: 100vh;
        background-color: #f5f7fa;
      }
      /* 左侧会话栏 */
      .sidebar {
        width: 260px;
        background: #fff;
        border-right: 1px solid #e5e7eb;
        padding: 20px 10px;
        display: flex;
        flex-direction: column;
      }
      .sidebar h2 {
        font-size: 18px;
        color: #1f2937;
        margin-bottom: 20px;
        text-align: center;
      }
      .new-conv {
        background: #1677ff;
        color: #fff;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin-bottom: 15px;
      }
      .conv-list {
        flex: 1;
        overflow-y: auto;
      }
      .conv-item {
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 8px;
        cursor: pointer;
        font-size: 14px;
      }
      .conv-item:hover {
        background: #f0f2f5;
      }
      .conv-item.active {
        background: #e6f4ff;
        color: #1677ff;
      }

      /* 主聊天区域 */
      .main-box {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .top-bar {
        height: 60px;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 20px;
      }
      .mode-btn {
        padding: 6px 12px;
        border: 1px solid #1677ff;
        background: #fff;
        color: #1677ff;
        border-radius: 4px;
        cursor: pointer;
      }
      .mode-btn.active {
        background: #1677ff;
        color: #fff;
      }

      /* 聊天内容区 */
      .chat-content {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
      }
      .msg {
        margin-bottom: 20px;
        max-width: 70%;
      }
      .user-msg {
        margin-left: auto;
      }
      .msg-text {
        padding: 12px 16px;
        border-radius: 12px;
        line-height: 1.6;
      }
      .user-msg .msg-text {
        background: #1677ff;
        color: #fff;
      }
      .ai-msg .msg-text {
        background: #fff;
        border: 1px solid #e5e7eb;
      }

      /* 底部输入区 */
      .input-box {
        height: 120px;
        background: #fff;
        border-top: 1px solid #e5e7eb;
        padding: 15px 20px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      #input-area {
        flex: 1;
        height: 80px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 10px;
        resize: none;
        font-size: 14px;
      }
      .btn-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .send-btn,
      .file-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .send-btn {
        background: #1677ff;
        color: #fff;
      }
      .file-btn {
        background: #f5f7fa;
        color: #333;
      }
      #file-input {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- 左侧会话列表 -->
    <div class="sidebar">
      <h2>智语助手</h2>
      <button class="new-conv" onclick="addConversation()">+ 新建会话</button>
      <div class="conv-list" id="convList">
        <div class="conv-item active" onclick="switchConv(this)">默认会话</div>
      </div>
    </div>

    <!-- 右侧主区域 -->
    <div class="main-box">
      <div class="top-bar">
        <span>对话模式：</span>
        <button
          class="mode-btn active"
          id="fastMode"
          onclick="switchMode('fast')"
        >
          快速模式
        </button>
        <button class="mode-btn" id="deepMode" onclick="switchMode('deep')">
          深度模式
        </button>
      </div>

      <div class="chat-content" id="chatContent">
        <div class="msg ai-msg">
          <div class="msg-text">
            你好！我是智语助手，随时随地伴你同行。有什么我可以帮助你的吗？
          </div>
        </div>
      </div>

      <div class="input-box">
        <textarea
          id="input-area"
          placeholder="请输入问题、文案、聊天内容..."
        ></textarea>
        <div class="btn-group">
          <button
            class="file-btn"
            onclick="document.getElementById('file-input').click()"
          >
            📎 上传文件
          </button>
          <button class="send-btn" onclick="sendMsg()">发送</button>
          <input type="file" id="file-input" onchange="previewFile(this)" />
        </div>
      </div>
    </div>

    <script>
      // 全局变量
      let currentMode = "fast";

      // 切换对话模式
      function switchMode(mode) {
        currentMode = mode;
        const fastBtn = document.getElementById("fastMode");
        const deepBtn = document.getElementById("deepMode");
        if (mode === "fast") {
          fastBtn.classList.add("active");
          deepBtn.classList.remove("active");
        } else {
          deepBtn.classList.add("active");
          fastBtn.classList.remove("active");
        }
      }

      // 发送消息
      function sendMsg() {
        const input = document.getElementById("input-area");
        const content = input.value.trim();
        const chatBox = document.getElementById("chatContent");
        if (!content) return;

        // 追加用户消息
        let userHtml = `
                <div class="msg user-msg">
                    <div class="msg-text">${content}</div>
                </div>
            `;
        chatBox.innerHTML += userHtml;
        input.value = "";

        // 模拟AI回复
        let aiReply = "";
        if (currentMode === "fast") {
          aiReply = `【快速模式】已收到你的内容：${content}。我会快速为你解答~`;
        } else {
          aiReply = `【深度模式】正在深度分析你的需求：${content}。结合多维度信息为你提供详细解答。`;
        }

        setTimeout(() => {
          let aiHtml = `
                    <div class="msg ai-msg">
                        <div class="msg-text">${aiReply}</div>
                    </div>
                `;
          chatBox.innerHTML += aiHtml;
          // 滚动到底部
          chatBox.scrollTop = chatBox.scrollHeight;
        }, 800);
      }

      // 新建会话
      function addConversation() {
        const convList = document.getElementById("convList");
        const randomName = "新会话_" + Math.floor(Math.random() * 1000);
        let newItem = document.createElement("div");
        newItem.className = "conv-item";
        newItem.innerText = randomName;
        newItem.onclick = function () {
          switchConv(this);
        };
        convList.appendChild(newItem);
        // 清空聊天区
        document.getElementById("chatContent").innerHTML = `
                <div class="msg ai-msg">
                    <div class="msg-text">你好！我是智语助手，新会话已创建，开始聊天吧~</div>
                </div>
            `;
      }

      // 切换会话
      function switchConv(el) {
        // 清空选中状态
        let items = document.querySelectorAll(".conv-item");
        items.forEach((item) => item.classList.remove("active"));
        el.classList.add("active");
        // 切换会话清空聊天记录
        document.getElementById("chatContent").innerHTML = `
                <div class="msg ai-msg">
                    <div class="msg-text">已切换至${el.innerText}，请开始对话。</div>
                </div>
            `;
      }

      // 文件上传预览模拟
      function previewFile(el) {
        if (el.files.length === 0) return;
        const fileName = el.files[0].name;
        const chatBox = document.getElementById("chatContent");
        let fileHtml = `
                <div class="msg user-msg">
                    <div class="msg-text">已上传文件：${fileName}</div>
                </div>
            `;
        chatBox.innerHTML += fileHtml;
        setTimeout(() => {
          let aiHtml = `
                    <div class="msg ai-msg">
                        <div class="msg-text">文件接收成功，我可以帮你总结、解读这份文件内容。</div>
                    </div>
                `;
          chatBox.innerHTML += aiHtml;
          chatBox.scrollTop = chatBox.scrollHeight;
        }, 600);
      }

      // 回车发送消息
      document
        .getElementById("input-area")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
          }
        });
    </script>
  </body>
</html>
